# EfficientNet-B0 jersey number classifier (SoccerNet jersey-2023)

data_root: null  # SOCCERNET_DATA or detetction_test/data/soccernet

model: efficientnet_b0  # efficientnet_b0 | resnet18
input_size: 224
pretrained: true

# Sample 1k-2k labeled thumbnails from train tracklets
max_train_samples: 2000
min_train_samples: 1000
train_val_split: 0.85

seed: 42

batch_size: 32
num_workers: 4
epochs: 25
early_stop_patience: 3  # stop if val_loss does not improve for this many epochs
lr: 0.0003
weight_decay: 0.0001
scheduler_step_size: 8
scheduler_gamma: 0.1

device: mps  # cuda | mps | cpu (auto-falls back if unavailable)
amp: false

output_dir: outputs
weights_out: ../../weights/jersey_number_b0.pt
meta_out: ../../weights/jersey_number_b0.json

min_val_accuracy: 0.50
