# OSNet-x1_0 fine-tuning on SoccerNet-ReID player crops

data_root: null  # defaults to SOCCERNET_DATA env or detetction_test/data/soccernet
crops_dir: null  # defaults to {data_root}/player_crops

model_name: osnet_x1_0
pretrained: true

input_height: 256
input_width: 128
min_crop_height: 50

train_split: 0.8
batch_size: 64
num_workers: 4
epochs: 30
early_stop_patience: 10

optimizer: adam
lr: 0.0003
weight_decay: 0.0005
triplet_weight: 0.5
scheduler_step_size: 10
scheduler_gamma: 0.1

device: cuda
amp: true

output_dir: outputs
weights_out: ../../weights/osnet_x1_0_soccernet.pth

rank1_min_signoff: 0.70
